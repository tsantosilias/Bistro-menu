<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bistro - Our Menu</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=GFS+Didot&family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Greek:wght@400;500;600;700;800&family=Playball&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
    
    <style>
        @font-face {
            font-family: 'Arrose';
            src: url('fonts/arrose/Arrose-m210m.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Arrose';
            src: url('fonts/arrose/ArroseItalic-7OrzK.ttf') format('truetype');
            font-weight: 400;
            font-style: italic;
            font-display: swap;
        }

        /* ΓΕΝΙΚΑ ΣΤΥΛ & ΚΑΘΑΡΗ ΓΡΑΜΜΑΤΟΣΕΙΡΑ */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            /* Προεπιλεγμένη γραμματοσειρά για όλο το μενού η καθαρή Inter */
            font-family: 'Inter', sans-serif; 
        }
        
        body { 
            background-image: url('my-background.png');
            background-attachment: fixed; 
            background-size: cover; 
            background-position: center; 
            color: #1e293b; 
            padding: 20px 10px; 
            overflow: hidden; 
            min-height: 100vh;
            height: 100vh; 
        }
        
        /* ΚΕΝΤΡΙΚΟΣ ΚΑΙ ΣΕΛΙΔΟΠΟΙΗΣΗ */
        .menu-wrapper { 
            width: 100%; 
            max-width: 850px; 
            margin: 0 auto; 
            background: #ffffff; 
            padding: 35px 25px 25px 25px; 
            border-radius: 16px; 
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.15); 
            border: 1px solid rgba(226, 232, 240, 0.8); 
            min-height: 90vh;
            max-height: calc(100vh - 40px); 
            overflow-y: auto; 
            overscroll-behavior: contain;
            position: relative;
        }

        .language-switch {
            position: absolute;
            top: 14px;
            right: 16px;
            display: inline-flex;
            gap: 5px;
            padding: 4px;
            border: 1px solid #e2e8f0;
            border-radius: 999px;
            background: rgba(248, 250, 252, 0.92);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
            z-index: 20;
        }

        .lang-btn {
            width: 34px;
            height: 30px;
            border: 0;
            border-radius: 999px;
            background: #ffffff;
            cursor: pointer;
            font-size: 17px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.18s ease, transform 0.18s ease;
        }

        .lang-btn:hover {
            transform: translateY(-1px);
        }

        .lang-btn.active {
            background: #0f172a;
            box-shadow: 0 6px 12px rgba(15, 23, 42, 0.18);
        }

        body.lang-el {
            font-family: 'Noto Sans Greek', 'Inter', sans-serif;
        }

        body.lang-el h1 {
            font-family: 'Arrose', 'GFS Didot', 'Noto Sans Greek', serif;
            font-size: clamp(28px, 6vw, 40px);
            font-style: normal;
            letter-spacing: 0;
            line-height: 1.08;
        }

        body.lang-el .category-section-title {
            font-family: 'Arrose', 'GFS Didot', 'Noto Sans Greek', serif;
            font-size: clamp(32px, 8vw, 44px);
            font-style: normal;
            font-weight: 400;
            line-height: 1.08;
        }

        body.lang-el .item-description,
        body.lang-el .item-badge,
        body.lang-el .modal-description,
        body.lang-el .menu-footer {
            font-family: 'Noto Sans Greek', 'Inter', sans-serif;
        }

        body.lang-el .item-name,
        body.lang-el .modal-title-row h2 {
            font-family: 'Arrose', 'GFS Didot', 'Noto Sans Greek', serif;
            font-style: normal;
            font-weight: 400;
            letter-spacing: 0;
        }

        body.lang-el .cat-btn {
            font-family: 'Inter', 'Noto Sans Greek', sans-serif;
            font-size: clamp(12.5px, 2.8vw, 13.5px);
            font-style: normal;
            font-weight: 600;
            letter-spacing: 0;
            line-height: 1.15;
            text-transform: none;
            padding-inline: clamp(15px, 4vw, 19px);
        }

        body.lang-el .item-name {
            font-size: clamp(21px, 4.9vw, 25px);
            letter-spacing: 0.025em;
            line-height: 1.14;
        }

        body.lang-el .modal-title-row h2 {
            font-size: clamp(25px, 6vw, 31px);
            line-height: 1.15;
        }
        
        /* ΤΙΤΛΟΣ ΜΕΝΟΥ (Elegant Serif) */
        h1 { 
            font-family: 'Playfair Display', serif;
            font-size: clamp(26px, 5vw, 38px); 
            font-style: italic;
            font-weight: 400;
            margin-bottom: 8px; 
            color: #0f172a; 
            letter-spacing: -0.5px; 
            text-align: center;
        }

        .restaurant-logo {
            display: none;
            width: clamp(58px, 18vw, 86px);
            max-height: 86px;
            object-fit: contain;
            margin: 0 auto 10px;
        }

        .restaurant-logo.visible {
            display: block;
        }
        
        .subtitle { 
            font-size: clamp(12px, 2.5vw, 14px);
            color: #64748b; 
            margin-bottom: 25px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-weight: 500;
            text-align: center;
        }

        .menu-note {
            max-width: 520px;
            margin: -12px auto 24px;
            color: #64748b;
            font-size: 13px;
            line-height: 1.5;
            text-align: center;
        }

        .wifi-info {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            max-width: 520px;
            margin: -10px auto 24px;
            color: #334155;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.4;
            text-align: center;
        }

        .wifi-info.visible {
            display: flex;
        }

        .wifi-info span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .wifi-info strong {
            color: #0f172a;
        }

        /* RESPONSIVE ΟΡΙΖΟΝΤΙΟ SCROLL ΣΤΙΣ ΚΑΤΗΓΟΡΙΕΣ */
        .categories { 
            display: flex; 
            flex-wrap: nowrap; 
            justify-content: flex-start; 
            gap: 8px; 
            
            overflow-x: auto; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; 
            
            position: sticky;
            top: -35px; 
            background: #ffffff; 
            padding-top: 20px;
            padding-bottom: 20px; 
            z-index: 10;
            border-bottom: 1px solid transparent;
            margin-bottom: 18px;
            box-shadow: none;
        }

        .categories.is-sticky {
            border-bottom-color: #f1f5f9;
            box-shadow: 0 1px 0 rgba(15, 23, 42, 0.12);
        }
        
        /* Κρύβουμε τη μπάρα σκρολαρίσματος */
        .categories::-webkit-scrollbar { display: none; }
        .categories { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* ΚΟΜΨΑ MINIMAL ΚΟΥΜΠΙΑ */
        .cat-btn { 
            padding: 8px 19px;
            border: 1px solid rgba(15, 23, 42, 0.12);
            background: #ffffff;
            cursor: pointer; 
            border-radius: 999px;
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            font-style: italic;
            font-weight: 600;
            letter-spacing: 0;
            text-transform: none;
            color: #334155;
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, color 0.2s ease, transform 0.2s ease;
            white-space: nowrap; 
            flex-shrink: 0; 
            box-shadow: 0 1px 0 rgba(15, 23, 42, 0.04);
        }
        
        .cat-btn.active, .cat-btn:hover { 
            background: #0f172a; 
            color: #ffffff; 
            border-color: #0f172a; 
            box-shadow: 0 1px 0 rgba(15, 23, 42, 0.16);
            transform: translateY(-1px);
        }
        
        /* EDIT HERE: Premium Italic Τίτλοι Κατηγοριών με τη σωστή γραμματοσειρά */
        .category-section-title {
            grid-column: 1 / -1; 
            font-family: 'Playball', cursive;
            font-size: clamp(34px, 9vw, 46px); 
            font-style: normal; 
            font-weight: 400; 
            color: #0f172a;
            text-align: center;
            margin-top: 42px;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            line-height: 1;
        }

        .category-section-title::before,
        .category-section-title::after {
            content: "";
            width: clamp(72px, 23vw, 116px);
            height: 36px;
            background-image: url("data:image/svg+xml,%3Csvg width='140' height='44' viewBox='0 0 140 44' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M137 22C116 5 92 4 70 22C47 40 25 40 13 30C1 20 7 3 24 5C41 7 42 27 28 27C16 27 17 12 30 9' stroke='%23111827' stroke-width='4' stroke-linecap='round'/%3E%3Cpath d='M76 19C65 8 51 7 43 17C36 26 44 36 54 31C63 26 57 15 47 18' stroke='%23111827' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            flex: 0 1 auto;
        }

        .category-section-title::after {
            transform: scaleX(-1);
        }
        
        /* ΠΛΕΓΜΑ ΜΕΝΟΥ (2 Στήλες) */
        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 18px 20px; 
            text-align: left; 
        }
        
        /* ΣΤΟΙΧΕΙΟ ΠΙΑΤΟΥ */
        .menu-item { 
            display: flex; 
            flex-direction: row; 
            gap: 14px; 
            width: 100%; 
            padding: 18px 0 14px;
            background: transparent;
            border: none;
            border-radius: 0;
            box-shadow: none;
            cursor: pointer;
            position: relative;
            transition: background 0.18s ease;
        }

        .menu-item::after {
            content: "";
            position: absolute;
            left: 3%;
            right: 3%;
            bottom: 0;
            height: 1px;
            background: rgba(15, 23, 42, 0.18);
        }

        .menu-item:hover {
            background: transparent;
        }

        .item-photo {
            width: 92px;
            height: 92px;
            flex: 0 0 92px;
            border-radius: 12px;
            object-fit: cover;
            background: #f1f5f9;
            align-self: center;
        }

        .item-content {
            min-width: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .item-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start;
            gap: 14px;
        }
        
        /* Elegant dish names, matched to the restaurant-menu title style. */
        .item-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(18px, 4vw, 20px);
            font-style: italic;
            font-weight: 600;
            color: #0f172a; 
            letter-spacing: 0;
            line-height: 1.18;
            min-width: 0;
            flex: 1;
            padding-top: 3px;
        }
        
        /* Compact tabular prices keep the right edge calm while scanning the menu. */
        .item-price { 
            font-family: 'Inter', 'Noto Sans Greek', sans-serif;
            font-size: clamp(14px, 3.4vw, 16px);
            font-weight: 700;
            color: #1e293b;
            white-space: nowrap; 
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.2px;
            line-height: 1.1;
            padding-top: 5px;
        }
        
        /* Καθαρή περιγραφή */
        .item-description {
            font-size: 13px;
            color: #64748b; 
            line-height: 1.5;
            min-height: 18px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: flex-end;
            align-self: flex-end;
            margin-top: 2px;
        }

        .item-badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 4px 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border: 1px solid transparent;
        }

        .item-badge.popular { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
        .item-badge.vegan { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
        .item-badge.vegetarian { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
        .item-badge.spicy { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }

        .no-items { 
            grid-column: 1 / -1; 
            text-align: center; 
            color: #94a3b8; 
            font-style: italic; 
            padding: 40px; 
        }

        .menu-footer {
            margin-top: 34px;
            padding: 22px 0 4px;
            border-top: 1px solid #f1f5f9;
            text-align: center;
            color: #64748b;
            font-size: 12px;
            line-height: 1.7;
        }

        .menu-footer strong {
            display: block;
            color: #0f172a;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .customer-modal {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background: rgba(15, 23, 42, 0.48);
            backdrop-filter: blur(5px);
        }

        .customer-modal.hidden {
            display: none;
        }

        .customer-modal-box {
            width: min(620px, 100%);
            max-height: calc(100svh - 36px);
            overflow-y: auto;
            background: #ffffff;
            border-radius: 22px;
            box-shadow: 0 28px 70px rgba(15, 23, 42, 0.3);
            position: relative;
            border: 1px solid rgba(226, 232, 240, 0.9);
        }

        .customer-modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.82);
            color: #ffffff;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            z-index: 2;
        }

        .modal-photo {
            width: calc(100% - 20px);
            height: clamp(280px, 54svh, 420px);
            margin: 10px 10px 0;
            object-fit: cover;
            background: #ffffff;
            border-radius: 16px;
            display: block;
        }

        .modal-content {
            padding: 16px 26px 26px;
        }

        .modal-title-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: start;
            gap: 18px;
            margin-bottom: 14px;
        }

        .modal-title-row h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(24px, 5vw, 30px);
            font-style: italic;
            font-weight: 600;
            line-height: 1.2;
            color: #0f172a;
            letter-spacing: 0;
        }

        .modal-price {
            font-family: 'Inter', 'Noto Sans Greek', sans-serif;
            color: #1e293b;
            font-weight: 700;
            white-space: nowrap;
            font-size: 20px;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.2px;
            padding-top: 4px;
        }

        .modal-description {
            color: #475569;
            font-size: 15px;
            line-height: 1.75;
            margin-bottom: 18px;
            max-width: 92%;
        }

        .modal-content .item-badges {
            justify-content: flex-start;
            align-self: auto;
            margin-top: 0;
            padding-top: 2px;
        }

        .modal-content .item-badge {
            padding: 5px 10px;
            font-size: 10px;
        }

        /* MEDIA QUERIES ΓΙΑ ΚΙΝΗΤΑ */
        @media (max-width: 768px) { 
            body {
                height: 100svh;
                min-height: 100svh;
                padding: 14px 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }

            .menu-wrapper {
                height: calc(100svh - 28px);
                min-height: 0;
                max-height: none;
                padding: 0 2px 18px;
                border-radius: 16px;
                overflow-y: auto;
                overscroll-behavior: contain;
            }

            header {
                padding-top: 46px;
            }

            .language-switch {
                top: 10px;
                right: 10px;
            }

            .lang-btn {
                width: 32px;
                height: 28px;
                font-size: 16px;
            }

            .menu-grid { 
                grid-template-columns: 1fr; 
                gap: 12px; 
            } 

            h1 {
                margin-bottom: 6px;
            }

            .subtitle {
                margin-bottom: 18px;
            }

            .categories {
                position: sticky;
                top: 0;
                margin-left: -2px;
                margin-right: -2px;
                padding: 12px 10px 12px;
                margin-bottom: 8px;
                background: rgba(255, 255, 255, 0.98);
            }

            .cat-btn {
                padding: 9px 18px;
                font-size: 13.5px;
            }

            body.lang-el .cat-btn {
                font-size: clamp(12px, 3.7vw, 13px);
                padding: 8px 15px;
                line-height: 1.15;
            }

            body.lang-el .item-name {
                font-size: clamp(21px, 6.2vw, 23px);
                letter-spacing: 0.02em;
                line-height: 1.12;
            }

            body.lang-el .modal-title-row h2 {
                font-size: clamp(25px, 7vw, 29px);
                line-height: 1.12;
            }

            .category-section-title {
                margin-top: 24px;
                margin-bottom: 12px;
            }

            body.lang-el .category-section-title {
                font-size: clamp(30px, 10vw, 39px);
            }

            .menu-item {
                padding: 16px 10px;
                gap: 12px;
            }

            .item-photo {
                width: 96px;
                height: 96px;
                flex-basis: 96px;
                border-radius: 10px;
            }

            .item-header {
                align-items: flex-start;
            }

            .item-description {
                font-size: 12px;
            }

            .menu-note {
                margin-bottom: 14px;
                font-size: 12px;
            }

            .wifi-info {
                margin-bottom: 18px;
                font-size: 11.5px;
                gap: 7px;
            }

            .modal-photo {
                width: calc(100% - 18px);
                height: clamp(260px, 48svh, 380px);
                margin: 9px 9px 0;
                border-radius: 15px;
            }

            .modal-content {
                padding: 14px 18px 22px;
            }

            .modal-title-row {
                gap: 12px;
            }

            .modal-price {
                font-size: 18px;
            }

            .modal-description {
                max-width: 100%;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="menu-wrapper">
        <div class="language-switch" aria-label="Menu language">
            <button class="lang-btn active" type="button" data-lang="en" aria-label="English menu">🇬🇧</button>
            <button class="lang-btn" type="button" data-lang="el" aria-label="Greek menu">🇬🇷</button>
        </div>

        <header>
            <img class="restaurant-logo" id="restaurant-logo" alt="Restaurant logo">
            <h1 data-i18n="title">The Bistro Menu</h1>
            <p class="subtitle" data-i18n="subtitle">Fresh ingredients • Crafted daily</p>
            <p class="menu-note" data-i18n="note">Browse our current dishes below. Please let our team know about allergies or dietary needs before ordering.</p>
            <div class="wifi-info" id="wifi-info" aria-live="polite">
                <span>Wifi: <strong id="wifi-name"></strong></span>
                <span>Password: <strong id="wifi-password"></strong></span>
            </div>
        </header>

        <nav class="categories" id="customer-nav-container"></nav>

        <main class="menu-grid" id="customer-menu-grid"></main>

        <footer class="menu-footer">
            <strong data-i18n="footerTitle">Thank you for visiting</strong>
            <span data-i18n="footerText">Prices include VAT. Ask our staff for daily specials and allergen information.</span>
        </footer>
    </div>

    <div class="customer-modal hidden" id="customer-item-modal">
        <div class="customer-modal-box">
            <button class="customer-modal-close" id="customer-modal-close" type="button">&times;</button>
            <div id="customer-modal-body"></div>
        </div>
    </div>

    <script type="module">
        import {
            db,
            collection,
            doc,
            onSnapshot
        } from "./firebase.js";

        let customerFilter = 'All';
        let currentLanguage = 'en';
        let sharedMenu = [];
        let categoriesToDisplay = ['Mains', 'Drinks', 'Desserts'];
        let hasLoadedMenuItems = false;
        let hasLoadError = false;
        let restaurantSettings = {
            restaurantName: 'Bistro',
            logoUrl: '',
            phone: '',
            address: '',
            instagram: '',
            wifiName: '',
            wifiPassword: '',
            primaryColor: '#0f172a',
            secondaryColor: '#f8fafc',
            currency: '€',
            languages: 'en,el',
            title: 'The Bistro Menu',
            subtitle: 'Fresh ingredients • Crafted daily',
            note: 'Browse our current dishes below. Please let our team know about allergies or dietary needs before ordering.',
            footerText: 'Prices include VAT. Ask our staff for daily specials and allergen information.',
            contactLine: ''
        };
        const itemModal = document.getElementById('customer-item-modal');
        const itemModalBody = document.getElementById('customer-modal-body');
        const itemModalClose = document.getElementById('customer-modal-close');
        const menuWrapper = document.querySelector('.menu-wrapper');
        const navContainer = document.getElementById('customer-nav-container');
        const translations = {
            en: {
                brand: 'Bistro',
                title: 'The Bistro Menu',
                subtitle: 'Fresh ingredients • Crafted daily',
                note: 'Browse our current dishes below. Please let our team know about allergies or dietary needs before ordering.',
                footerTitle: 'Thank you for visiting',
                footerText: 'Prices include VAT. Ask our staff for daily specials and allergen information.',
                loading: 'Loading menu...',
                error: 'We could not load the menu right now. Please try again shortly.',
                all: 'All',
                empty: 'Our kitchen is preparing updates. Check back shortly!',
                emptyCategory: 'No items available in this category.',
                noDescription: 'No description available.',
                outOfStock: 'Out of stock',
                viewItem: 'View',
                categories: {
                    Starters: 'Starters',
                    Salads: 'Salads',
                    Mains: 'Mains',
                    Desserts: 'Desserts',
                    Drinks: 'Drinks',
                    Cocktails: 'Cocktails'
                },
                badges: {
                    popular: 'Popular',
                    vegan: 'Vegan',
                    vegetarian: 'Vegetarian',
                    spicy: 'Spicy'
                }
            },
            el: {
                brand: 'Bistro',
                title: 'Το Μενού του Bistro',
                subtitle: 'Φρέσκα υλικά • Καθημερινή προετοιμασία',
                note: 'Δείτε τα διαθέσιμα πιάτα μας. Ενημερώστε μας για αλλεργίες ή διατροφικές ανάγκες πριν την παραγγελία.',
                footerTitle: 'Σας ευχαριστούμε για την επίσκεψη',
                footerText: 'Οι τιμές περιλαμβάνουν ΦΠΑ. Ρωτήστε το προσωπικό μας για πιάτα ημέρας και πληροφορίες αλλεργιογόνων.',
                all: 'Όλα',
                empty: 'Η κουζίνα μας ετοιμάζει ενημερώσεις. Ελέγξτε ξανά σε λίγο!',
                emptyCategory: 'Δεν υπάρχουν διαθέσιμα πιάτα σε αυτή την κατηγορία.',
                noDescription: 'Δεν υπάρχει διαθέσιμη περιγραφή.',
                outOfStock: 'Μη διαθέσιμο',
                viewItem: 'Προβολή',
                categories: {
                    Starters: 'Ορεκτικά',
                    Salads: 'Σαλάτες',
                    Mains: 'Κυρίως',
                    Desserts: 'Γλυκά',
                    Drinks: 'Ποτά',
                    Cocktails: 'Κοκτέιλ'
                },
                badges: {
                    popular: 'Δημοφιλές',
                    vegan: 'Vegan',
                    vegetarian: 'Vegeterian',
                    spicy: 'Πικάντικο'
                }
            }
        };

        function t(key) {
            return translations[currentLanguage][key] || translations.en[key] || key;
        }

        function categoryLabel(category) {
            return translations[currentLanguage].categories[category] || category;
        }

        function categorySectionLabel(category) {
            const label = categoryLabel(category);
            if (currentLanguage !== 'el') return label;

            return label
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLocaleUpperCase('el-GR');
        }

        function badgeLabel(badge) {
            return translations[currentLanguage].badges[badge] || translations.en.badges[badge] || badge;
        }

        function dishName(item) {
            return currentLanguage === 'el' && item.nameEl ? item.nameEl : item.name;
        }

        function displayDishName(item) {
            const name = dishName(item);
            if (currentLanguage !== 'el') return name;

            return name
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLocaleUpperCase('el-GR');
        }

        function dishDescription(item) {
            return currentLanguage === 'el' && item.descriptionEl ? item.descriptionEl : item.description;
        }

        function escapeHTML(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function safeClassName(value) {
            return String(value || '').replace(/[^a-z0-9_-]/gi, '-');
        }

        function formatPrice(value) {
            const price = Number.parseFloat(value);
            return Number.isFinite(price) ? price.toFixed(2) : '0.00';
        }

        function currencySymbol() {
            return restaurantSettings.currency || '€';
        }

        function enabledLanguages() {
            const rawLanguages = restaurantSettings.languages || 'en,el';
            const languages = String(rawLanguages)
                .split(',')
                .map(language => language.trim())
                .filter(language => translations[language]);
            return languages.length > 0 ? languages : ['en'];
        }

        function applyLanguage() {
            const activeLanguages = enabledLanguages();
            if (!activeLanguages.includes(currentLanguage)) {
                currentLanguage = activeLanguages[0];
            }
            document.documentElement.lang = currentLanguage === 'el' ? 'el' : 'en';
            document.body.classList.toggle('lang-el', currentLanguage === 'el');
            document.querySelectorAll('[data-i18n]').forEach((element) => {
                element.textContent = t(element.dataset.i18n);
            });
            applyRestaurantSettings();
            const languageSwitch = document.querySelector('.language-switch');
            if (languageSwitch) {
                languageSwitch.hidden = activeLanguages.length <= 1;
            }
            document.querySelectorAll('[data-lang]').forEach((button) => {
                const isAllowed = activeLanguages.includes(button.dataset.lang);
                const isActive = button.dataset.lang === currentLanguage;
                button.hidden = !isAllowed;
                button.classList.toggle('active', isActive);
                button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
            });
            displayCustomerMenu();
        }

        function applyRestaurantSettings() {
            const title = restaurantSettings.title || restaurantSettings.restaurantName || t('title');
            const subtitle = restaurantSettings.subtitle || t('subtitle');
            const note = restaurantSettings.note || t('note');
            const contactParts = [
                restaurantSettings.address,
                restaurantSettings.phone,
                restaurantSettings.instagram
            ].filter(Boolean);
            const footerText = [restaurantSettings.footerText || t('footerText'), ...contactParts]
                .filter(Boolean)
                .join(' ');

            const titleEl = document.querySelector('[data-i18n="title"]');
            const subtitleEl = document.querySelector('[data-i18n="subtitle"]');
            const noteEl = document.querySelector('[data-i18n="note"]');
            const footerTextEl = document.querySelector('[data-i18n="footerText"]');
            const logoEl = document.getElementById('restaurant-logo');
            const wifiInfoEl = document.getElementById('wifi-info');
            const wifiNameEl = document.getElementById('wifi-name');
            const wifiPasswordEl = document.getElementById('wifi-password');

            if (logoEl) {
                logoEl.src = restaurantSettings.logoUrl || '';
                logoEl.classList.toggle('visible', Boolean(restaurantSettings.logoUrl));
            }
            if (titleEl) titleEl.textContent = title;
            if (subtitleEl) subtitleEl.textContent = subtitle;
            if (noteEl) noteEl.textContent = note;
            if (footerTextEl) footerTextEl.textContent = footerText;
            if (wifiInfoEl && wifiNameEl && wifiPasswordEl) {
                const wifiName = restaurantSettings.wifiName || '';
                const wifiPassword = restaurantSettings.wifiPassword || '';
                wifiNameEl.textContent = wifiName;
                wifiPasswordEl.textContent = wifiPassword;
                wifiInfoEl.classList.toggle('visible', Boolean(wifiName || wifiPassword));
            }
        }

        function displayCustomerMenu() {
            const grid = document.getElementById('customer-menu-grid');
            const navContainer = document.getElementById('customer-nav-container');
            grid.innerHTML = '';

            sharedMenu.sort((a, b) => parseInt(a.order || 0) - parseInt(b.order || 0));

            navContainer.innerHTML = '';
            
            const allBtn = document.createElement('button');
            allBtn.className = `cat-btn ${customerFilter === 'All' ? 'active' : ''}`;
            allBtn.textContent = t('all');
            allBtn.onclick = () => filterCustomerMenu('All');
            navContainer.appendChild(allBtn);

            categoriesToDisplay.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `cat-btn ${customerFilter === cat ? 'active' : ''}`;
                btn.textContent = categoryLabel(cat);
                btn.onclick = () => filterCustomerMenu(cat);
                navContainer.appendChild(btn);
            });

            if (hasLoadError) {
                grid.innerHTML = `<div class="no-items">${t('error')}</div>`;
                return;
            }

            if (!hasLoadedMenuItems) {
                grid.innerHTML = `<div class="no-items">${t('loading')}</div>`;
                return;
            }

            if (sharedMenu.length === 0) {
                grid.innerHTML = `<div class="no-items">${t('empty')}</div>`;
                return;
            }

            if (customerFilter === 'All') {
                categoriesToDisplay.forEach(cat => {
                    const catItems = sharedMenu.filter(item => item.category === cat);
                    if (catItems.length > 0) {
                        const titleDiv = document.createElement('div');
                        titleDiv.className = 'category-section-title';
                        titleDiv.textContent = categorySectionLabel(cat);
                        grid.appendChild(titleDiv);

                        catItems.forEach(item => appendItemToGrid(grid, item));
                    }
                });
            } else {
                const visibleItems = sharedMenu.filter(item => item.category === customerFilter);
                if (visibleItems.length === 0) {
                    grid.innerHTML = `<div class="no-items">${t('emptyCategory')}</div>`;
                    return;
                }
                visibleItems.forEach(item => appendItemToGrid(grid, item));
            }
        }

        function appendItemToGrid(container, item) {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'menu-item';
            itemDiv.setAttribute('role', 'button');
            itemDiv.setAttribute('tabindex', '0');
            const name = displayDishName(item);
            const description = dishDescription(item);
            itemDiv.setAttribute('aria-label', `${t('viewItem')} ${name}`);
            
            const descriptionContent = description ? escapeHTML(description) : '&nbsp;';
            const imageHTML = item.imageUrl
                ? `<img class="item-photo" src="${escapeHTML(item.imageUrl)}" alt="${escapeHTML(name)}" loading="lazy" onerror="this.style.display='none'">`
                : '';
            const badges = Array.isArray(item.badges) ? item.badges : [];
            const badgesHTML = badges.length > 0
                ? `<div class="item-badges">${badges.map(badge => `<span class="item-badge ${safeClassName(badge)}">${escapeHTML(badgeLabel(badge))}</span>`).join('')}</div>`
                : '';
            
            const priceHTML = item.hidden 
                ? `<span style="color: #ef4444; font-size: 13px; font-weight: 500; letter-spacing: 0;">${t('outOfStock')}</span>`
                : `${formatPrice(item.price)} ${escapeHTML(currencySymbol())}`;

            const nameStyle = item.hidden 
                ? `color: #94a3b8; font-weight: 500; font-style: italic;` 
                : `color: #0f172a;`;

            itemDiv.innerHTML = `
                ${imageHTML}
                <div class="item-content">
                    <div class="item-header" style="${item.hidden ? 'opacity: 0.6;' : ''}">
                        <span class="item-name" style="${nameStyle}">${escapeHTML(name)}</span>
                        <span class="item-price">${priceHTML}</span>
                    </div>
                    <div class="item-description" style="${item.hidden ? 'opacity: 0.5;' : ''}">${descriptionContent}</div>
                    ${badgesHTML}
                </div>
            `;
            itemDiv.addEventListener('click', () => openItemModal(item));
            itemDiv.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    openItemModal(item);
                }
            });
            
            container.appendChild(itemDiv);
        }

        function openItemModal(item) {
            const badges = Array.isArray(item.badges) ? item.badges : [];
            const badgesHTML = badges.length > 0
                ? `<div class="item-badges">${badges.map(badge => `<span class="item-badge ${safeClassName(badge)}">${escapeHTML(badgeLabel(badge))}</span>`).join('')}</div>`
                : '';
            const name = displayDishName(item);
            const description = dishDescription(item);
            const imageHTML = item.imageUrl
                ? `<img class="modal-photo" src="${escapeHTML(item.imageUrl)}" alt="${escapeHTML(name)}">`
                : '';
            const priceHTML = item.hidden
                ? `<span style="color: #ef4444;">${t('outOfStock')}</span>`
                : `${formatPrice(item.price)} ${escapeHTML(currencySymbol())}`;

            itemModalBody.innerHTML = `
                ${imageHTML}
                <div class="modal-content">
                    <div class="modal-title-row">
                        <h2>${escapeHTML(name)}</h2>
                        <span class="modal-price">${priceHTML}</span>
                    </div>
                    <p class="modal-description">${escapeHTML(description || t('noDescription'))}</p>
                    ${badgesHTML}
                </div>
            `;
            itemModal.classList.remove('hidden');
        }

        function closeItemModal() {
            itemModal.classList.add('hidden');
            itemModalBody.innerHTML = '';
        }

        itemModalClose.addEventListener('click', closeItemModal);
        itemModal.addEventListener('click', (event) => {
            if (event.target === itemModal) closeItemModal();
        });
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && !itemModal.classList.contains('hidden')) closeItemModal();
        });

        function filterCustomerMenu(category) {
            customerFilter = category;
            displayCustomerMenu();
        }

        function initializeStickyCategoryShadow() {
            if (!menuWrapper || !navContainer || !window.IntersectionObserver) return;

            const stickySentinel = document.createElement('div');
            stickySentinel.setAttribute('aria-hidden', 'true');
            navContainer.before(stickySentinel);

            // The 1px shadow appears only after the category tabs begin sticking.
            const observer = new IntersectionObserver(([entry]) => {
                navContainer.classList.toggle('is-sticky', !entry.isIntersecting);
            }, {
                root: menuWrapper,
                threshold: 0
            });

            observer.observe(stickySentinel);
        }

        document.querySelectorAll('[data-lang]').forEach((button) => {
            button.addEventListener('click', () => {
                currentLanguage = button.dataset.lang;
                applyLanguage();
            });
        });

        applyLanguage();
        initializeStickyCategoryShadow();

        onSnapshot(doc(db, 'settings', 'categories'), (snapshot) => {
            if (snapshot.exists() && Array.isArray(snapshot.data().order)) {
                categoriesToDisplay = snapshot.data().order;
                displayCustomerMenu();
            }
        }, (error) => {
            console.error('Category listener error:', error);
        });

        onSnapshot(doc(db, 'settings', 'restaurant'), (snapshot) => {
            if (snapshot.exists()) {
                restaurantSettings = {
                    ...restaurantSettings,
                    ...snapshot.data()
                };
                applyLanguage();
            }
        }, (error) => {
            console.error('Restaurant settings listener error:', error);
        });

        onSnapshot(collection(db, 'menuItems'), (snapshot) => {
            hasLoadedMenuItems = true;
            hasLoadError = false;
            sharedMenu = snapshot.docs.map(menuDoc => ({
                id: menuDoc.id,
                ...menuDoc.data()
            }));
            displayCustomerMenu();
        }, (error) => {
            console.error('Menu listener error:', error);
            hasLoadedMenuItems = true;
            hasLoadError = true;
            displayCustomerMenu();
        });
    </script>
</body>
</html>
