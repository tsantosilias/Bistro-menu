<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bistro - Our Menu</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
    
    <style>
        /* ΓΕΝΙΚΑ ΣΤΥΛ & ΚΑΘΑΡΗ ΓΡΑΜΜΑΤΟΣΕΙΡΑ */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            /* Προεπιλεγμένη γραμματοσειρά για όλο το μενού η καθαρή Inter */
            font-family: 'Inter', sans-serif; 
        }
        
        body { 
            background-image: url('my-background.png');
            background-attachment: fixed; 
            background-size: cover; 
            background-position: center; 
            color: #1e293b; 
            padding: 20px 10px; 
            overflow: hidden; 
            min-height: 100vh;
            height: 100vh; 
        }
        
        /* ΚΕΝΤΡΙΚΟΣ ΚΑΙ ΣΕΛΙΔΟΠΟΙΗΣΗ */
        .menu-wrapper { 
            width: 100%; 
            max-width: 850px; 
            margin: 0 auto; 
            background: #ffffff; 
            padding: 35px 25px 25px 25px; 
            border-radius: 16px; 
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.15); 
            border: 1px solid rgba(226, 232, 240, 0.8); 
            min-height: 90vh;
            max-height: calc(100vh - 40px); 
            overflow-y: auto; 
            overscroll-behavior: contain;
        }
        
        /* ΤΙΤΛΟΣ ΜΕΝΟΥ (Elegant Serif) */
        h1 { 
            font-family: 'Playfair Display', serif;
            font-size: clamp(26px, 5vw, 38px); 
            font-style: italic;
            font-weight: 400;
            margin-bottom: 8px; 
            color: #0f172a; 
            letter-spacing: -0.5px; 
            text-align: center;
        }

        .menu-kicker {
            font-size: 11px;
            color: #64748b;
            font-weight: 700;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 5px;
        }
        
        .subtitle { 
            font-size: clamp(12px, 2.5vw, 14px);
            color: #64748b; 
            margin-bottom: 25px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-weight: 500;
            text-align: center;
        }

        .menu-note {
            max-width: 520px;
            margin: -12px auto 24px;
            color: #64748b;
            font-size: 13px;
            line-height: 1.5;
            text-align: center;
        }
        
        /* RESPONSIVE ΟΡΙΖΟΝΤΙΟ SCROLL ΣΤΙΣ ΚΑΤΗΓΟΡΙΕΣ */
        .categories { 
            display: flex; 
            flex-wrap: nowrap; 
            justify-content: flex-start; 
            gap: 8px; 
            
            overflow-x: auto; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; 
            
            position: sticky;
            top: -35px; 
            background: #ffffff; 
            padding-top: 20px;
            padding-bottom: 20px; 
            z-index: 10;
            border-bottom: 1px solid #f1f5f9;
            margin-bottom: 30px;
            box-shadow: 0 8px 18px rgba(255, 255, 255, 0.95);
        }
        
        /* Κρύβουμε τη μπάρα σκρολαρίσματος */
        .categories::-webkit-scrollbar { display: none; }
        .categories { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* ΚΟΜΨΑ MINIMAL ΚΟΥΜΠΙΑ */
        .cat-btn { 
            padding: 8px 18px; 
            border: 1px solid #e2e8f0; 
            background: #f8fafc; 
            cursor: pointer; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 500;
            color: #475569; 
            transition: all 0.2s ease; 
            white-space: nowrap; 
            flex-shrink: 0; 
        }
        
        .cat-btn.active, .cat-btn:hover { 
            background: #0f172a; 
            color: #ffffff; 
            border-color: #0f172a; 
            box-shadow: 0 7px 14px rgba(15, 23, 42, 0.14);
        }
        
        /* EDIT HERE: Premium Italic Τίτλοι Κατηγοριών με τη σωστή γραμματοσειρά */
        .category-section-title {
            grid-column: 1 / -1; 
            font-family: 'Playfair Display', serif;
            font-size: clamp(24px, 5vw, 30px); 
            font-style: italic; 
            font-weight: 400; 
            color: #0f172a;
            text-align: left;
            margin-top: 25px;
            margin-bottom: 15px;
        }
        
        /* ΠΛΕΓΜΑ ΜΕΝΟΥ (2 Στήλες) */
        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 18px 20px; 
            text-align: left; 
        }
        
        /* ΣΤΟΙΧΕΙΟ ΠΙΑΤΟΥ */
        .menu-item { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            width: 100%; 
            padding: 16px;
            background: #ffffff;
            border: 1px solid #eef2f7;
            border-radius: 14px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
        }
        
        .item-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: baseline; 
            gap: 8px;
        }
        
        /* Καθαρό, modern όνομα πιάτου */
        .item-name { 
            font-size: clamp(15px, 3.5vw, 16px); 
            font-weight: 600; 
            color: #0f172a; 
            letter-spacing: -0.2px;
            line-height: 1.25;
        }
        
        /* Minimal λεπτή διακεκομμένη γραμμή */
        .item-dots { 
            flex-grow: 1; 
            border-bottom: 1px dashed #cbd5e1; 
            margin: 0 8px; 
            position: relative;
            top: -4px;
        }
        
        /* Καθαρή, modern τιμή */
        .item-price { 
            font-size: clamp(15px, 3.5vw, 16px); 
            font-weight: 500; 
            color: #0f172a; 
            white-space: nowrap; 
        }
        
        /* Καθαρή περιγραφή */
        .item-description {
            font-size: 13px;
            color: #64748b; 
            line-height: 1.5;
            margin-top: 2px;
            min-height: 18px; 
        }

        .item-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .item-badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 4px 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border: 1px solid transparent;
        }

        .item-badge.popular { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
        .item-badge.vegan { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
        .item-badge.vegetarian { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
        .item-badge.spicy { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
        
        .no-items { 
            grid-column: 1 / -1; 
            text-align: center; 
            color: #94a3b8; 
            font-style: italic; 
            padding: 40px; 
        }

        .menu-footer {
            margin-top: 34px;
            padding: 22px 0 4px;
            border-top: 1px solid #f1f5f9;
            text-align: center;
            color: #64748b;
            font-size: 12px;
            line-height: 1.7;
        }

        .menu-footer strong {
            display: block;
            color: #0f172a;
            font-size: 14px;
            margin-bottom: 4px;
        }

        /* MEDIA QUERIES ΓΙΑ ΚΙΝΗΤΑ */
        @media (max-width: 768px) { 
            body {
                height: 100svh;
                min-height: 100svh;
                padding: 14px 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }

            .menu-wrapper {
                height: calc(100svh - 28px);
                min-height: 0;
                max-height: none;
                padding: 22px 14px 18px;
                border-radius: 16px;
                overflow-y: auto;
                overscroll-behavior: contain;
            }

            .menu-grid { 
                grid-template-columns: 1fr; 
                gap: 12px; 
            } 

            h1 {
                margin-bottom: 6px;
            }

            .subtitle {
                margin-bottom: 18px;
            }

            .categories {
                top: -24px;
                margin-left: -14px;
                margin-right: -14px;
                padding: 13px 14px;
                margin-bottom: 14px;
            }

            .category-section-title {
                margin-top: 14px;
                margin-bottom: 4px;
            }

            .menu-item {
                padding: 14px;
                border-radius: 12px;
                gap: 7px;
            }

            .item-header {
                align-items: flex-start;
            }

            .item-description {
                font-size: 12px;
            }

            .menu-note {
                margin-bottom: 18px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="menu-wrapper">
        <header>
            <p class="menu-kicker">Bistro</p>
            <h1>The Bistro Menu</h1>
            <p class="subtitle">Fresh ingredients • Crafted daily</p>
            <p class="menu-note">Browse our current dishes below. Please let our team know about allergies or dietary needs before ordering.</p>
        </header>

        <nav class="categories" id="customer-nav-container"></nav>

        <main class="menu-grid" id="customer-menu-grid"></main>

        <footer class="menu-footer">
            <strong>Thank you for visiting</strong>
            Prices include VAT. Ask our staff for daily specials and allergen information.
        </footer>
    </div>

    <script type="module">
        import {
            db,
            collection,
            doc,
            onSnapshot
        } from "./firebase.js";

        let customerFilter = 'All';
        let sharedMenu = [];
        let categoriesToDisplay = ['Mains', 'Drinks', 'Desserts'];
        const badgeLabels = {
            popular: 'Popular',
            vegan: 'Vegan',
            vegetarian: 'Vegetarian',
            spicy: 'Spicy'
        };

        function displayCustomerMenu() {
            const grid = document.getElementById('customer-menu-grid');
            const navContainer = document.getElementById('customer-nav-container');
            grid.innerHTML = '';

            sharedMenu.sort((a, b) => parseInt(a.order || 0) - parseInt(b.order || 0));

            navContainer.innerHTML = '';
            
            const allBtn = document.createElement('button');
            allBtn.className = `cat-btn ${customerFilter === 'All' ? 'active' : ''}`;
            allBtn.textContent = 'All';
            allBtn.onclick = () => filterCustomerMenu('All');
            navContainer.appendChild(allBtn);

            categoriesToDisplay.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `cat-btn ${customerFilter === cat ? 'active' : ''}`;
                btn.textContent = cat;
                btn.onclick = () => filterCustomerMenu(cat);
                navContainer.appendChild(btn);
            });

            if (sharedMenu.length === 0) {
                grid.innerHTML = `<div class="no-items">Our kitchen is preparing updates. Check back shortly!</div>`;
                return;
            }

            if (customerFilter === 'All') {
                categoriesToDisplay.forEach(cat => {
                    const catItems = sharedMenu.filter(item => item.category === cat);
                    if (catItems.length > 0) {
                        const titleDiv = document.createElement('div');
                        titleDiv.className = 'category-section-title';
                        titleDiv.textContent = cat;
                        grid.appendChild(titleDiv);

                        catItems.forEach(item => appendItemToGrid(grid, item));
                    }
                });
            } else {
                const visibleItems = sharedMenu.filter(item => item.category === customerFilter);
                if (visibleItems.length === 0) {
                    grid.innerHTML = `<div class="no-items">No items available in this category.</div>`;
                    return;
                }
                visibleItems.forEach(item => appendItemToGrid(grid, item));
            }
        }

        function appendItemToGrid(container, item) {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'menu-item';
            
            const descriptionContent = item.description ? item.description : '&nbsp;';
            const badges = Array.isArray(item.badges) ? item.badges : [];
            const badgesHTML = badges.length > 0
                ? `<div class="item-badges">${badges.map(badge => `<span class="item-badge ${badge}">${badgeLabels[badge] || badge}</span>`).join('')}</div>`
                : '';
            
            const priceHTML = item.hidden 
                ? `<span style="color: #ef4444; font-size: 13px; font-weight: 500; letter-spacing: 0;">Out of stock</span>`
                : `${parseFloat(item.price).toFixed(2)} €`;

            const nameStyle = item.hidden 
                ? `color: #94a3b8; font-weight: 500; font-style: italic;` 
                : `color: #0f172a;`;

            itemDiv.innerHTML = `
                <div class="item-header" style="${item.hidden ? 'opacity: 0.6;' : ''}">
                    <span class="item-name" style="${nameStyle}">${item.name}</span>
                    <span class="item-dots"></span>
                    <span class="item-price">${priceHTML}</span>
                </div>
                <div class="item-description" style="${item.hidden ? 'opacity: 0.5;' : ''}">${descriptionContent}</div>
                ${badgesHTML}
            `;
            
            container.appendChild(itemDiv);
        }

        function filterCustomerMenu(category) {
            customerFilter = category;
            displayCustomerMenu();
        }

        displayCustomerMenu();

        onSnapshot(doc(db, 'settings', 'categories'), (snapshot) => {
            if (snapshot.exists() && Array.isArray(snapshot.data().order)) {
                categoriesToDisplay = snapshot.data().order;
                displayCustomerMenu();
            }
        }, (error) => console.error('Category listener error:', error));

        onSnapshot(collection(db, 'menuItems'), (snapshot) => {
            sharedMenu = snapshot.docs.map(menuDoc => ({
                id: menuDoc.id,
                ...menuDoc.data()
            }));
            displayCustomerMenu();
        }, (error) => console.error('Menu listener error:', error));
    </script>
</body>
</html>
