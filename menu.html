<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bistro - Our Menu</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
    
    <style>
        /* ΓΕΝΙΚΑ ΣΤΥΛ & ΚΑΘΑΡΗ ΓΡΑΜΜΑΤΟΣΕΙΡΑ */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            /* Προεπιλεγμένη γραμματοσειρά για όλο το μενού η καθαρή Inter */
            font-family: 'Inter', sans-serif; 
        }
        
        body { 
            background-image: url('my-background.png');
            background-attachment: fixed; 
            background-size: cover; 
            background-position: center; 
            color: #1e293b; 
            padding: 20px 10px; 
            overflow: hidden; 
            min-height: 100vh;
            height: 100vh; 
        }
        
        /* ΚΕΝΤΡΙΚΟΣ ΚΑΙ ΣΕΛΙΔΟΠΟΙΗΣΗ */
        .menu-wrapper { 
            width: 100%; 
            max-width: 850px; 
            margin: 0 auto; 
            background: #ffffff; 
            padding: 35px 25px 25px 25px; 
            border-radius: 16px; 
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.15); 
            border: 1px solid rgba(226, 232, 240, 0.8); 
            min-height: 90vh;
            max-height: calc(100vh - 40px); 
            overflow-y: auto; 
            overscroll-behavior: contain;
        }
        
        /* ΤΙΤΛΟΣ ΜΕΝΟΥ (Elegant Serif) */
        h1 { 
            font-family: 'Playfair Display', serif;
            font-size: clamp(26px, 5vw, 38px); 
            font-style: italic;
            font-weight: 400;
            margin-bottom: 8px; 
            color: #0f172a; 
            letter-spacing: -0.5px; 
            text-align: center;
        }

        .menu-kicker {
            font-size: 11px;
            color: #64748b;
            font-weight: 700;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 5px;
        }
        
        .subtitle { 
            font-size: clamp(12px, 2.5vw, 14px);
            color: #64748b; 
            margin-bottom: 25px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-weight: 500;
            text-align: center;
        }

        .menu-note {
            max-width: 520px;
            margin: -12px auto 24px;
            color: #64748b;
            font-size: 13px;
            line-height: 1.5;
            text-align: center;
        }

        .view-toggle {
            display: inline-flex;
            gap: 4px;
            padding: 4px;
            margin: 0 auto 18px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 999px;
        }

        .view-toggle-wrap {
            display: flex;
            justify-content: center;
        }

        .view-toggle button {
            border: none;
            background: transparent;
            color: #64748b;
            border-radius: 999px;
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .view-toggle button.active {
            background: #0f172a;
            color: #ffffff;
        }
        
        /* RESPONSIVE ΟΡΙΖΟΝΤΙΟ SCROLL ΣΤΙΣ ΚΑΤΗΓΟΡΙΕΣ */
        .categories { 
            display: flex; 
            flex-wrap: nowrap; 
            justify-content: flex-start; 
            gap: 8px; 
            
            overflow-x: auto; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; 
            
            position: sticky;
            top: -35px; 
            background: #ffffff; 
            padding-top: 20px;
            padding-bottom: 20px; 
            z-index: 10;
            border-bottom: 1px solid #f1f5f9;
            margin-bottom: 30px;
            box-shadow: 0 8px 18px rgba(255, 255, 255, 0.95);
        }
        
        /* Κρύβουμε τη μπάρα σκρολαρίσματος */
        .categories::-webkit-scrollbar { display: none; }
        .categories { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* ΚΟΜΨΑ MINIMAL ΚΟΥΜΠΙΑ */
        .cat-btn { 
            padding: 8px 18px; 
            border: 1px solid #e2e8f0; 
            background: #f8fafc; 
            cursor: pointer; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 500;
            color: #475569; 
            transition: all 0.2s ease; 
            white-space: nowrap; 
            flex-shrink: 0; 
        }
        
        .cat-btn.active, .cat-btn:hover { 
            background: #0f172a; 
            color: #ffffff; 
            border-color: #0f172a; 
            box-shadow: 0 7px 14px rgba(15, 23, 42, 0.14);
        }
        
        /* EDIT HERE: Premium Italic Τίτλοι Κατηγοριών με τη σωστή γραμματοσειρά */
        .category-section-title {
            grid-column: 1 / -1; 
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 6vw, 36px); 
            font-style: italic; 
            font-weight: 400; 
            color: #0f172a;
            text-align: center;
            margin-top: 42px;
            margin-bottom: 22px;
        }
        
        /* ΠΛΕΓΜΑ ΜΕΝΟΥ (2 Στήλες) */
        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 18px 20px; 
            text-align: left; 
        }
        
        /* ΣΤΟΙΧΕΙΟ ΠΙΑΤΟΥ */
        .menu-item { 
            display: flex; 
            flex-direction: row; 
            gap: 14px; 
            width: 100%; 
            padding: 14px;
            background: #ffffff;
            border: 1px solid #eef2f7;
            border-radius: 14px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .menu-item:hover {
            transform: translateY(-1px);
            border-color: #dbe4ef;
            box-shadow: 0 12px 26px rgba(15, 23, 42, 0.08);
        }

        .item-photo {
            width: 92px;
            height: 92px;
            flex: 0 0 92px;
            border-radius: 12px;
            object-fit: cover;
            background: #f1f5f9;
            align-self: center;
        }

        .item-content {
            min-width: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .item-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start;
            gap: 14px;
        }
        
        /* Καθαρό, modern όνομα πιάτου */
        .item-name { 
            font-size: clamp(15px, 3.5vw, 16px); 
            font-weight: 600; 
            color: #0f172a; 
            letter-spacing: -0.2px;
            line-height: 1.25;
            min-width: 0;
            flex: 1;
            padding-top: 5px;
        }
        
        /* Καθαρή, modern τιμή */
        .item-price { 
            font-size: clamp(16px, 3.8vw, 18px); 
            font-weight: 800; 
            color: #0f172a; 
            white-space: nowrap; 
            font-variant-numeric: tabular-nums;
            line-height: 1;
            padding-top: 1px;
        }
        
        /* Καθαρή περιγραφή */
        .item-description {
            font-size: 13px;
            color: #64748b; 
            line-height: 1.5;
            min-height: 18px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: flex-end;
            align-self: flex-end;
            margin-top: 2px;
        }

        .item-badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 4px 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border: 1px solid transparent;
        }

        .item-badge.popular { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
        .item-badge.vegan { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
        .item-badge.vegetarian { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
        .item-badge.spicy { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }

        .menu-grid.classic-view {
            gap: 24px 46px;
        }

        .classic-view .menu-item {
            display: block;
            padding: 0 0 18px;
            border: none;
            border-bottom: 1px solid #eef2f7;
            border-radius: 0;
            box-shadow: none;
            background: transparent;
        }

        .classic-view .menu-item:hover {
            transform: none;
            box-shadow: none;
            border-color: #eef2f7;
        }

        .classic-view .item-photo {
            display: none;
        }

        .classic-view .item-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .classic-view .item-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 14px;
        }

        .classic-view .item-description {
            display: block;
            min-height: 0;
            overflow: visible;
            font-size: 13px;
        }

        .classic-view .item-badges {
            justify-content: flex-end;
            align-self: flex-end;
            margin-top: 2px;
        }
        
        .no-items { 
            grid-column: 1 / -1; 
            text-align: center; 
            color: #94a3b8; 
            font-style: italic; 
            padding: 40px; 
        }

        .menu-footer {
            margin-top: 34px;
            padding: 22px 0 4px;
            border-top: 1px solid #f1f5f9;
            text-align: center;
            color: #64748b;
            font-size: 12px;
            line-height: 1.7;
        }

        .menu-footer strong {
            display: block;
            color: #0f172a;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .customer-modal {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background: rgba(15, 23, 42, 0.48);
            backdrop-filter: blur(5px);
        }

        .customer-modal.hidden {
            display: none;
        }

        .customer-modal-box {
            width: min(520px, 100%);
            max-height: calc(100svh - 36px);
            overflow-y: auto;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24);
            position: relative;
        }

        .customer-modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.82);
            color: #ffffff;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            z-index: 2;
        }

        .modal-photo {
            width: 100%;
            height: 240px;
            object-fit: cover;
            background: #f1f5f9;
            border-radius: 18px 18px 0 0;
            display: block;
        }

        .modal-content {
            padding: 22px;
        }

        .modal-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 12px;
        }

        .modal-title-row h2 {
            font-size: 22px;
            line-height: 1.2;
            color: #0f172a;
        }

        .modal-price {
            color: #0f172a;
            font-weight: 800;
            white-space: nowrap;
        }

        .modal-description {
            color: #475569;
            font-size: 14px;
            line-height: 1.65;
            margin-bottom: 16px;
        }

        /* MEDIA QUERIES ΓΙΑ ΚΙΝΗΤΑ */
        @media (max-width: 768px) { 
            body {
                height: 100svh;
                min-height: 100svh;
                padding: 14px 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }

            .menu-wrapper {
                height: calc(100svh - 28px);
                min-height: 0;
                max-height: none;
                padding: 22px 14px 18px;
                border-radius: 16px;
                overflow-y: auto;
                overscroll-behavior: contain;
            }

            .menu-grid { 
                grid-template-columns: 1fr; 
                gap: 12px; 
            } 

            h1 {
                margin-bottom: 6px;
            }

            .subtitle {
                margin-bottom: 18px;
            }

            .categories {
                top: -24px;
                margin-left: -14px;
                margin-right: -14px;
                padding: 13px 14px;
                margin-bottom: 14px;
            }

            .category-section-title {
                margin-top: 34px;
                margin-bottom: 18px;
            }

            .menu-item {
                padding: 14px;
                border-radius: 12px;
                gap: 12px;
            }

            .item-photo {
                width: 96px;
                height: 96px;
                flex-basis: 96px;
                border-radius: 10px;
            }

            .item-header {
                align-items: flex-start;
            }

            .item-description {
                font-size: 12px;
            }

            .menu-note {
                margin-bottom: 18px;
                font-size: 12px;
            }

            .view-toggle {
                margin-bottom: 14px;
            }

            .classic-view .menu-item {
                padding-bottom: 16px;
            }

            .modal-photo {
                height: 210px;
            }

            .modal-content {
                padding: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="menu-wrapper">
        <header>
            <p class="menu-kicker">Bistro</p>
            <h1>The Bistro Menu</h1>
            <p class="subtitle">Fresh ingredients • Crafted daily</p>
            <p class="menu-note">Browse our current dishes below. Please let our team know about allergies or dietary needs before ordering.</p>
        </header>

        <div class="view-toggle-wrap">
            <div class="view-toggle" aria-label="Menu view">
                <button type="button" class="active" data-view-mode="photo">Photo</button>
                <button type="button" data-view-mode="classic">Classic</button>
            </div>
        </div>

        <nav class="categories" id="customer-nav-container"></nav>

        <main class="menu-grid" id="customer-menu-grid"></main>

        <footer class="menu-footer">
            <strong>Thank you for visiting</strong>
            Prices include VAT. Ask our staff for daily specials and allergen information.
        </footer>
    </div>

    <div class="customer-modal hidden" id="customer-item-modal">
        <div class="customer-modal-box">
            <button class="customer-modal-close" id="customer-modal-close" type="button">&times;</button>
            <div id="customer-modal-body"></div>
        </div>
    </div>

    <script type="module">
        import {
            db,
            collection,
            doc,
            onSnapshot
        } from "./firebase.js";

        let customerFilter = 'All';
        let viewMode = 'photo';
        let sharedMenu = [];
        let categoriesToDisplay = ['Mains', 'Drinks', 'Desserts'];
        const itemModal = document.getElementById('customer-item-modal');
        const itemModalBody = document.getElementById('customer-modal-body');
        const itemModalClose = document.getElementById('customer-modal-close');
        const badgeLabels = {
            popular: 'Popular',
            vegan: 'Vegan',
            vegetarian: 'Vegetarian',
            spicy: 'Spicy'
        };

        function displayCustomerMenu() {
            const grid = document.getElementById('customer-menu-grid');
            const navContainer = document.getElementById('customer-nav-container');
            grid.innerHTML = '';
            grid.classList.toggle('classic-view', viewMode === 'classic');

            sharedMenu.sort((a, b) => parseInt(a.order || 0) - parseInt(b.order || 0));

            navContainer.innerHTML = '';
            
            const allBtn = document.createElement('button');
            allBtn.className = `cat-btn ${customerFilter === 'All' ? 'active' : ''}`;
            allBtn.textContent = 'All';
            allBtn.onclick = () => filterCustomerMenu('All');
            navContainer.appendChild(allBtn);

            categoriesToDisplay.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `cat-btn ${customerFilter === cat ? 'active' : ''}`;
                btn.textContent = cat;
                btn.onclick = () => filterCustomerMenu(cat);
                navContainer.appendChild(btn);
            });

            if (sharedMenu.length === 0) {
                grid.innerHTML = `<div class="no-items">Our kitchen is preparing updates. Check back shortly!</div>`;
                return;
            }

            if (customerFilter === 'All') {
                categoriesToDisplay.forEach(cat => {
                    const catItems = sharedMenu.filter(item => item.category === cat);
                    if (catItems.length > 0) {
                        const titleDiv = document.createElement('div');
                        titleDiv.className = 'category-section-title';
                        titleDiv.textContent = cat;
                        grid.appendChild(titleDiv);

                        catItems.forEach(item => appendItemToGrid(grid, item));
                    }
                });
            } else {
                const visibleItems = sharedMenu.filter(item => item.category === customerFilter);
                if (visibleItems.length === 0) {
                    grid.innerHTML = `<div class="no-items">No items available in this category.</div>`;
                    return;
                }
                visibleItems.forEach(item => appendItemToGrid(grid, item));
            }
        }

        function appendItemToGrid(container, item) {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'menu-item';
            itemDiv.setAttribute('role', 'button');
            itemDiv.setAttribute('tabindex', '0');
            itemDiv.setAttribute('aria-label', `View ${item.name}`);
            
            const descriptionContent = item.description ? item.description : '&nbsp;';
            const imageHTML = item.imageUrl
                ? `<img class="item-photo" src="${item.imageUrl}" alt="${item.name}" loading="lazy" onerror="this.style.display='none'">`
                : '';
            const badges = Array.isArray(item.badges) ? item.badges : [];
            const badgesHTML = badges.length > 0
                ? `<div class="item-badges">${badges.map(badge => `<span class="item-badge ${badge}">${badgeLabels[badge] || badge}</span>`).join('')}</div>`
                : '';
            
            const priceHTML = item.hidden 
                ? `<span style="color: #ef4444; font-size: 13px; font-weight: 500; letter-spacing: 0;">Out of stock</span>`
                : `${parseFloat(item.price).toFixed(2)} €`;

            const nameStyle = item.hidden 
                ? `color: #94a3b8; font-weight: 500; font-style: italic;` 
                : `color: #0f172a;`;

            itemDiv.innerHTML = `
                ${imageHTML}
                <div class="item-content">
                    <div class="item-header" style="${item.hidden ? 'opacity: 0.6;' : ''}">
                        <span class="item-name" style="${nameStyle}">${item.name}</span>
                        <span class="item-price">${priceHTML}</span>
                    </div>
                    <div class="item-description" style="${item.hidden ? 'opacity: 0.5;' : ''}">${descriptionContent}</div>
                    ${badgesHTML}
                </div>
            `;
            itemDiv.addEventListener('click', () => openItemModal(item));
            itemDiv.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    openItemModal(item);
                }
            });
            
            container.appendChild(itemDiv);
        }

        function openItemModal(item) {
            const badges = Array.isArray(item.badges) ? item.badges : [];
            const badgesHTML = badges.length > 0
                ? `<div class="item-badges">${badges.map(badge => `<span class="item-badge ${badge}">${badgeLabels[badge] || badge}</span>`).join('')}</div>`
                : '';
            const imageHTML = item.imageUrl
                ? `<img class="modal-photo" src="${item.imageUrl}" alt="${item.name}">`
                : '';
            const priceHTML = item.hidden
                ? `<span style="color: #ef4444;">Out of stock</span>`
                : `${parseFloat(item.price).toFixed(2)} €`;

            itemModalBody.innerHTML = `
                ${imageHTML}
                <div class="modal-content">
                    <div class="modal-title-row">
                        <h2>${item.name}</h2>
                        <span class="modal-price">${priceHTML}</span>
                    </div>
                    <p class="modal-description">${item.description || 'No description available.'}</p>
                    ${badgesHTML}
                </div>
            `;
            itemModal.classList.remove('hidden');
        }

        function closeItemModal() {
            itemModal.classList.add('hidden');
            itemModalBody.innerHTML = '';
        }

        itemModalClose.addEventListener('click', closeItemModal);
        itemModal.addEventListener('click', (event) => {
            if (event.target === itemModal) closeItemModal();
        });
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && !itemModal.classList.contains('hidden')) closeItemModal();
        });

        function filterCustomerMenu(category) {
            customerFilter = category;
            displayCustomerMenu();
        }

        document.querySelectorAll('[data-view-mode]').forEach(button => {
            button.addEventListener('click', () => {
                viewMode = button.dataset.viewMode;
                document.querySelectorAll('[data-view-mode]').forEach(toggleButton => {
                    toggleButton.classList.toggle('active', toggleButton === button);
                });
                displayCustomerMenu();
            });
        });

        displayCustomerMenu();

        onSnapshot(doc(db, 'settings', 'categories'), (snapshot) => {
            if (snapshot.exists() && Array.isArray(snapshot.data().order)) {
                categoriesToDisplay = snapshot.data().order;
                displayCustomerMenu();
            }
        }, (error) => console.error('Category listener error:', error));

        onSnapshot(collection(db, 'menuItems'), (snapshot) => {
            sharedMenu = snapshot.docs.map(menuDoc => ({
                id: menuDoc.id,
                ...menuDoc.data()
            }));
            displayCustomerMenu();
        }, (error) => console.error('Menu listener error:', error));
    </script>
</body>
</html>
